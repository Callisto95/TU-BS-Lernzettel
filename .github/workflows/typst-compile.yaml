name: Build Typst Documents

on:
    push:
        paths:
            - "**.typ"
            - ".github/workflows/typst-compile.yaml"
    workflow_dispatch:

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            font-path: ${{ steps.fonts.outputs.font-path }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            # - name: Prepare Install fonts
            #   uses: fontist/setup-fontist@v2
            # - name: Install Inter font
            #   run: fontist install --no-progress "Inter"
            # - name: Install Fira Math font
            #   run: |
            #       mkdir -p ~/.local/share/fonts
            #       curl -L -o ~/.local/share/fonts/FiraMath-Regular.otf https://github.com/firamath/firamath/releases/download/v0.3.4/FiraMath-Regular.otf
            #       fc-cache -f -v
            - name: Download fonts
              run: |
                  mkdir -p ~/.local/share/fonts
                  # Download Inter zip
                  curl -L -o /tmp/Inter.zip https://github.com/rsms/inter/releases/download/v4.1/Inter-4.1.zip
                  # Unzip only the TTF files (regular, bold, etc.)
                  unzip -j /tmp/Inter.zip "Inter-4.1/ttf/*.ttf" -d ~/.local/share/fonts
                  # Download Fira Math
                  curl -L -o ~/.local/share/fonts/FiraMath-Regular.otf https://github.com/firamath/firamath/releases/download/v0.3.4/FiraMath-Regular.otf
                  # Refresh font cache
                  fc-cache -f -v
            - name: Set font path output
              id: fonts
              run: echo "font-path=${HOME}/.local/share/fonts" >> $GITHUB_OUTPUT
            - name: Install Typst
              uses: typst-community/setup-typst@v4

    build:
        runs-on: ubuntu-latest
        needs: prepare
        outputs:
            build-dir: build
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: Compile Typst documents
              run: |
                  set -e
                  mkdir -p build
                  for file in $(find . -name "*.typ"); do
                    name=$(basename "$file" .typ)
                    echo "Compiling $file..."
                    typst compile --font-path ${{ needs.prepare.outputs.font-path }} "$file" "build/$name.pdf"
                  done

    release:
        runs-on: ubuntu-latest
        needs: build
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: Create Release
              id: create_release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  name: auto-generated latest notes
                  body: "Automatically generated PDFs from the latest commit (currently `${{ github.sha }}`)"
                  files: ${{ needs.build.outputs.build-dir }}/*.pdf
                  prerelease: true
                  make_latest: true
                  overwrite_files: true
