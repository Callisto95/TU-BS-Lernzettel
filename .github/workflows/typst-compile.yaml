name: Build Typst Documents

on:
    push:
        paths:
            - "**.typ"
            - ".github/workflows/typst-compile.yaml"
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: prepare Install fonts
              uses: fontist/setup-fontist@v2
            - name: Install fonts
              run: fontist install --no-progress "Inter"
              # fontist doesn't have Fira Math in its repos, manual install is needed
            - name: Install Fira Math font
              run: |
                  mkdir -p ~/.local/share/fonts
                  curl -L -o ~/.local/share/fonts/FiraMath-Regular.otf https://github.com/firamath/firamath/releases/download/v0.3.4/FiraMath-Regular.otf
                  fc-cache -f -v
            - name: Install Typst
              uses: typst-community/setup-typst@v4
            - name: Compile Typst documents
              run: |
                  mkdir -p build
                  for file in $(find . -name "*.typ"); do
                    name=$(basename "$file" .typ)
                    typst compile --font-path ~/.fontist/fonts "$file" "build/$name-${{ github.sha }}.pdf"
                  done
            - name: Create Release
              id: create_release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  name: latest version of the notes
                  body: Automatically generated PDFs from the latest commit.
                  files: build/*.pdf
                  prerelease: true
                  make_latest: true
