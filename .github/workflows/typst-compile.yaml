name: Build Typst Documents

on:
    push:
        paths:
            - "**.typ"
            - ".github/workflows/typst-compile.yaml"
    workflow_dispatch:

defaults:
    run:
        shell: nu {0}

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: Setup Nu
              uses: hustcer/setup-nu@v3
              with:
                  version: "*"
            # Cache fonts to speed up workflow
            - name: Cache fonts
              uses: actions/cache@v5
              with:
                  path: ~/.local/share/fonts
                  key: fonts-cache-v1
            - name: Download fonts
              run: |
                  mkdir ~/.local/share/fonts
                  if not ("~/.local/share/fonts/Inter-Regular.otf" | path exists) {
                      curl -L -o /tmp/Inter.zip https://github.com/rsms/inter/releases/download/v4.1/Inter-4.1.zip
                      unzip -j /tmp/Inter.zip "extras/otf/*.otf" -d ~/.local/share/fonts
                  }
                  if not ("~/.local/share/fonts/FiraMath-Regular.otf" | path exists) {
                      curl -L -o ~/.local/share/fonts/FiraMath-Regular.otf https://github.com/firamath/firamath/releases/download/v0.3.4/FiraMath-Regular.otf
                  }
                  fc-cache -f -v
            - name: Install Typst
              uses: typst-community/setup-typst@v4
            - name: Compile Typst documents
              run: |
                  mkdir build
                  ^find . -type f -name "*.typ" | lines | par-each { |file|
                    let output = $file | path basename | str replace ".typ" ".pdf"
                    echo $"Compiling ($file)..."
                    typst compile --font-path ~/.local/share/fonts/ $file $"build/($output)"
                    $output
                  }
            # Upload all PDFs as an artifact for release
            - name: Upload PDFs
              uses: actions/upload-artifact@v7
              with:
                  name: typst-pdfs
                  path: build/*.pdf

    release:
        runs-on: ubuntu-latest
        needs: build
        permissions:
            contents: write
        steps:
            - name: Download PDFs artifact
              uses: actions/download-artifact@v8
              with:
                  name: typst-pdfs
                  path: build
            - name: Create Release
              id: create_release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  name: auto-generated latest notes
                  body: "Automatically generated PDFs from the latest commit (currently from [${{ github.sha }}](https://github.com/Callisto95/TU-BS-Lernzettel/tree/${{ github.sha }}))"
                  files: build/*.pdf
                  prerelease: true
                  make_latest: true
                  overwrite_files: true
