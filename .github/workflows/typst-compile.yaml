name: Build Typst Documents

on:
    push:
        paths:
            - "**.typ"
            - ".github/workflows/typst-compile.yaml"
    workflow_dispatch:

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            font-path: ${{ steps.fonts.outputs.font-path }}
        steps:
            # Cache fonts to speed up workflow
            - name: Cache fonts
              uses: actions/cache@v5
              with:
                  path: ~/.local/share/fonts
                  key: fonts-cache-v1
            - name: Download fonts
              run: |
                  mkdir -p ~/.local/share/fonts
                  # Download Inter zip if not cached
                  if [ ! -f ~/.local/share/fonts/Inter-Regular.otf ]; then
                    curl -L -o /tmp/Inter.zip https://github.com/rsms/inter/releases/download/v4.1/Inter-4.1.zip
                    unzip -j /tmp/Inter.zip "extras/otf/*.otf" -d ~/.local/share/fonts
                  fi
                  # Download Fira Math if not cached
                  if [ ! -f ~/.local/share/fonts/FiraMath-Regular.otf ]; then
                    curl -L -o ~/.local/share/fonts/FiraMath-Regular.otf https://github.com/firamath/firamath/releases/download/v0.3.4/FiraMath-Regular.otf
                  fi
                  fc-cache -f -v
            - name: Set font path output
              id: fonts
              run: echo "font-path=${HOME}/.local/share/fonts" >> $GITHUB_OUTPUT

    build:
        runs-on: ubuntu-latest
        needs: prepare
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: Install Typst
              uses: typst-community/setup-typst@v4
            - name: Compile Typst documents
              run: |
                  set -e
                  mkdir -p build
                  find . -type f -name "*.typ" -print0 | while IFS= read -r -d '' file; do
                    name=$(basename "$file" .typ)
                    echo "Compiling $file..."
                    typst compile --font-path ${{ needs.prepare.outputs.font-path }} "$file" "build/$name.pdf"
                  done
            # Upload all PDFs as an artifact for release
            - name: Upload PDFs
              uses: actions/upload-artifact@v7
              with:
                  name: typst-pdfs
                  path: build/*.pdf

    release:
        runs-on: ubuntu-latest
        needs: build
        permissions:
            contents: write
        steps:
            - name: Download PDFs artifact
              uses: actions/download-artifact@v8
              with:
                  name: typst-pdfs
                  path: build
            - name: Create Release
              id: create_release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  name: auto-generated latest notes
                  body: "Automatically generated PDFs from the latest commit (currently from [${{ github.sha }}](https://github.com/Callisto95/TU-BS-Lernzettel/tree/${{ github.sha }}))"
                  files: build/*.pdf
                  prerelease: true
                  make_latest: true
                  overwrite_files: true
